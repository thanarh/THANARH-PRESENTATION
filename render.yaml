###############################################################
# render.yaml — Thanarah Presentation Portal
#
# Two services:
#   1. thanarah-api   — Express + MongoDB API (Node.js)
#   2. thanarah-portal — Vite SPA (Static Site)
#
# Required env vars to set manually in the Render dashboard:
#   MONGODB_URI, SESSION_SECRET, JWT_SECRET, FRONTEND_URL
#   (set FRONTEND_URL to your portal service's public URL)
###############################################################

services:
  # ── 1. API Server ──────────────────────────────────────────
  - type: web
    name: thanarah-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false           # Set in Render dashboard
      - key: SESSION_SECRET
        sync: false           # Set in Render dashboard
      - key: JWT_SECRET
        sync: false           # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false           # Set to your portal URL, e.g. https://thanarah-portal.onrender.com

  # ── 2. Portal (Static Site) ────────────────────────────────
  - type: web
    name: thanarah-portal
    runtime: static
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/thanarah-portal run build
    staticPublishPath: ./artifacts/thanarah-portal/dist/public
    autoDeploy: true
    routes:
      # Serve API calls through the portal's CDN edge (optional: remove if API is on a separate domain)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Long-lived cache for hashed assets
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Security headers for all responses
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), clipboard-read=(), clipboard-write=()

###############################################################
# render.yaml — Thanarah Presentation Portal
#
# Single service: the Express API server builds the Vite SPA
# and serves it as static files.  No separate static-site
# service is needed — everything runs from one Node.js process.
#
# Required env vars (set in the Render dashboard):
#   MONGODB_URI, SESSION_SECRET, JWT_SECRET
#   SMTP_PASSWORD        — cPanel SMTP password
#   BASE_URL             — public URL of this service, e.g.
#                          https://thanarah-portal.onrender.com
#                          (used in password-reset links)
###############################################################

services:
  - type: web
    name: thanarah-portal
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ NODE_ENV=production
      pnpm --filter @workspace/thanarah-portal run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/api-server run seed
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── SMTP (cPanel) ────────────────────────────────────────
      - key: SMTP_HOST
        value: business197.web-hosting.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USERNAME
        value: noreply@thanarah.com
      - key: SMTP_FROM_EMAIL
        value: noreply@thanarah.com
      - key: SMTP_FROM_NAME
        value: Thanarah
      - key: MAIL_PROVIDER
        value: CPANEL
      # ── MongoDB ──────────────────────────────────────────────
      - key: MONGODB_DATABASE_NAME
        value: thanarah_presentation
      # ── Secrets (set in Render dashboard, not here) ──────────
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false        # e.g. https://thanarah-portal.onrender.com
